<style>
header,.header,#header,.navbar,.nav-container,.site-header,footer,.footer,#footer{display:none!important;height:0!important}
#otis-terminal-wrapper{background-color:#1a0f00;background-image:radial-gradient(circle,#2b1d0e 0%,#0d0905 100%);color:#ff9933;font-family:'Courier New',Courier,monospace;padding:20px;display:flex;flex-direction:column;align-items:center;min-height:100vh;border:2px solid #3d2b1f;box-sizing:border-box}
.logo-container{position:relative;width:300px;height:160px;margin:10px auto;border:2px solid #8b4513;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent}
#userLogo{width:100%;height:100%;object-fit:contain;display:none}
.otis-watermark{position:absolute;bottom:8px;right:8px;width:40px;height:40px;z-index:20;pointer-events:none}
.divider{width:100%;max-width:320px;height:2px;background:linear-gradient(90deg,transparent,#8b4513,#ff9933,#8b4513,transparent);margin:12px 0}
.quote-zone{position:relative;width:100%;max-width:320px;height:100px;display:flex;justify-content:center;align-items:center;margin:10px 0}
.otis-ghost-text{position:absolute;font-size:70px;font-weight:900;color:rgba(255,153,51,0.15);letter-spacing:25px;pointer-events:none;white-space:nowrap;text-transform:uppercase;font-family:'Arial Black',Gadget,sans-serif;z-index:1}
.tool-row{display:flex;gap:10px;justify-content:center;margin-top:5px;width:100%;max-width:350px}
.tool-item{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;width:100px;z-index:2}
.clock-btn{width:60px;height:60px;border:2px solid #8b4513;border-radius:4px;transition:transform .1s}
.time-label{font-size:9px;color:#ff9933;text-align:center;margin-top:8px;font-weight:bold;min-height:24px;line-height:1.1;text-transform:uppercase}
#dashboard{width:100%;max-width:320px;background:rgba(0,0,0,0.6);border:1px solid #8b4513;padding:15px;border-radius:8px;margin-top:10px}
.metric-line{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;border-bottom:1px dashed rgba(139,69,19,0.3);padding-bottom:4px}
.metric-val{color:#fff;font-weight:bold;text-shadow:0 0 8px #ff9933}
.metric-controls{display:flex;gap:20px;margin-top:15px;border-top:1px solid #3d2b1f;padding-top:15px;justify-content:center;align-items:center}
.toolkit-container{width:100%;max-width:320px;margin-top:20px}
.toolkit-title{font-size:10px;text-align:center;color:#8b4513;letter-spacing:3px;margin-bottom:10px;font-weight:bold}
.otis-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0d0905;z-index:1000;padding:20px;box-sizing:border-box;overflow-y:auto;color:#ff9933;border:4px solid #8b4513}
.modal-title{font-weight:bold;text-align:center;margin-bottom:20px;text-transform:uppercase;font-size:14px;color:#ff9933}
.close-modal-btn{background:#8b4513;color:#fff;width:100%;padding:15px;margin-top:20px;border:none;font-weight:bold;cursor:pointer}
.quote-form input,.quote-form select,.quote-form textarea{width:100%;background:#1a0f00;border:1px solid #8b4513;color:#ff9933;padding:10px;margin-bottom:12px;border-radius:4px;font-family:'Courier New',monospace;box-sizing:border-box}
.quote-label{font-size:9px;text-transform:uppercase;margin-bottom:4px;display:block;color:#8b4513}
.screenshot-notice{background:rgba(255,153,51,0.1);border:1px dashed #ff9933;padding:10px;text-align:center;font-size:10px;margin-top:15px}
</style>
<div id="otis-terminal-wrapper">
<div style="font-size:10px;letter-spacing:2px;">OTIS – DETAILER SERVICE MODULE V3.3</div>
<div class="logo-container" id="logoClickZone">
<img id="userLogo" src="">
<div id="uploadPrompt" style="font-size:12px;color:#8b4513;">TAP TO UPLOAD LOGO</div>
<input type="file" id="logoInput" accept="image/*" style="display:none">
<img src="https://i.ibb.co/M5ZD7vLv/otisicon.jpg" class="otis-watermark">
</div>
<div class="divider"></div>
<div class="quote-zone">
